<body>
    <head>
        <title>Contoh Multimedia Element audio</title>
    </head>
    <body>
        <h1>Contoh Multimedia Element audio</h1>
        <p>Audio file :</p>
        <audio controls>
            <source src="file-audio.mp3" type="audio/mpeg">
            <source src="file-audio (2).ogg" type="audio/ogg">
            Your browser does not support the audio element
        </audio>
    </body>
    <head>
        <title>Contoh Multimedia Element video</title>
    </head>
    <body>
        <h1>Contoh Multimedia Element video</h1>
        <p>Video file :</p>
        <video controls width="600">
            <source src="file-video.mp4" type="video/mp4">
            <source src="file-video (2).webm" type="video/webm">
            Your browser does not support the video element
        </video>
    </body>
</body>
